<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CyberScan AI | تسجيل الدخول</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1 class="site-title">🛡️ الحصن الرقمي</h1>

    <!-- بقية محتوى الصفحة -->

    <div class="card">

        <h2>🔐 تسجيل الدخول</h2>

        <input
            type="email"
            id="email"
            placeholder="البريد الإلكتروني">

        <br>

        <input
            type="password"
            id="password"
            placeholder="كلمة المرور">

        <br>

        <button
            class="scan-btn"
            onclick="login()">

            دخول

        </button>

        <br><br>

        <p>

            ليس لديك حساب؟

            <a href="register.html">

                إنشاء حساب

            </a>

        </p>

    </div>

</div>

<script src="auth.js"></script>

</body>

</html>
