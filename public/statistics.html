<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إحصائيات المشروع | الحصن الرقمي</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>📊 إحصائيات الحصن الرقمي</h1>

        <p>
            تعرض هذه الصفحة ملخصًا لجميع عمليات الفحص التي تم حفظها.
        </p>

    </div>

    <div class="dashboard">

        <div class="card info-card">

            <h3>📋 عدد الفحوصات</h3>

            <p id="totalScans">0</p>

        </div>

        <div class="card info-card">

            <h3>🟢 المواقع الآمنة</h3>

            <p id="safeSites">0</p>

        </div>

        <div class="card info-card">

            <h3>🟡 المواقع المتوسطة</h3>

            <p id="mediumSites">0</p>

        </div>

        <div class="card info-card">

            <h3>🔴 المواقع الخطرة</h3>

            <p id="dangerSites">0</p>

        </div>

        <div class="card info-card">

            <h3>⭐ متوسط درجة الأمان</h3>

            <p id="averageScore">0 / 100</p>

        </div>

    </div>

    <div class="card">

        <h2>📌 ملاحظات</h2>

        <p>
            يتم احتساب هذه الإحصائيات اعتمادًا على سجل الفحوصات المحفوظ داخل النظام.
        </p>

    </div>

    <div class="card">

        <button class="scan-btn" onclick="window.location.href='index.html'">

            🏠 العودة للرئيسية

        </button>

    </div>

</div>

<script>

const history = JSON.parse(localStorage.getItem("scanHistory")) || [];

document.getElementById("totalScans").textContent = history.length;

let safe = 0;
let medium = 0;
let danger = 0;
let totalScore = 0;

history.forEach(scan => {

    const score = Number(scan.securityScore) || 0;

    totalScore += score;

    if (score >= 80) {

        safe++;

    } else if (score >= 50) {

        medium++;

    } else {

        danger++;

    }

});

document.getElementById("safeSites").textContent = safe;
document.getElementById("mediumSites").textContent = medium;
document.getElementById("dangerSites").textContent = danger;

const avg = history.length
    ? Math.round(totalScore / history.length)
    : 0;

document.getElementById("averageScore").textContent = avg + " / 100";

</script>

</body>
</html>
