<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CyberScan AI | إنشاء حساب</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>🛡️ CyberScan AI</h1>

    <div class="card">

        <h2>👤 إنشاء حساب جديد</h2>

        <input
            type="text"
            id="name"
            placeholder="الاسم الكامل">

        <br>

        <input
            type="email"
            id="email"
            placeholder="البريد الإلكتروني">

        <br>

        <input
            type="password"
            id="password"
            placeholder="كلمة المرور">

        <br>

        <button
            class="scan-btn"
            onclick="registerUser()">

            إنشاء حساب

        </button>

        <br><br>

        <p>

            لديك حساب بالفعل؟

            <a href="login.html">

                تسجيل الدخول

            </a>

        </p>

    </div>

</div>

<script src="auth.js"></script>

</body>

</html>
