<svg width="200" height="240" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">

<defs>
    <linearGradient id="blueShield" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#38bdf8"/>
        <stop offset="50%" stop-color="#2563eb"/>
        <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <filter id="glow">
        <feGaussianBlur stdDeviation="5"/>
    </filter>
</defs>


<!-- توهج خلف الدرع -->
<path
d="M100 10 L180 40 V110 C180 170 140 210 100 230 C60 210 20 170 20 110 V40 Z"
fill="#2563eb"
opacity="0.5"
filter="url(#glow)"
/>


<!-- جسم الدرع -->
<path
d="M100 10 L180 40 V110 C180 170 140 210 100 230 C60 210 20 170 20 110 V40 Z"
fill="url(#blueShield)"
stroke="#38bdf8"
stroke-width="6"
/>


